<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 등록 페이지</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f9f9f9;
      line-height: 1.8;
    }

    .container {
      width: 80%;
      max-width: 700px;
      margin: 0 auto;
      background-color: white;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #1d4ed8;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      vertical-align: top;
    }

    .label {
      width: 140px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 5px;
      box-sizing: border-box;
    }

    textarea {
      resize: none;
    }

    .btn-area {
      text-align: center;
      margin-top: 20px;
    }

    input[type="submit"],
    input[type="reset"] {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      border-radius: 5px;
      background-color: #1d4ed8;
      color: white;
      cursor: pointer;
    }

    .home-link {
      text-align: center;
      margin-top: 25px;
    }

    .home-link a {
      text-decoration: none;
      color: #1d4ed8;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>사용자 등록 페이지</h1>

    <form>
      <table>
        <tr>
          <td class="label"><label for="name">이름</label></td>
          <td><input type="text" id="name" name="name"></td>
        </tr>

        <tr>
          <td class="label"><label for="userid">아이디</label></td>
          <td><input type="text" id="userid" name="userid"></td>
        </tr>

        <tr>
          <td class="label"><label for="password">비밀번호</label></td>
          <td><input type="password" id="password" name="password"></td>
        </tr>

        <tr>
          <td class="label">성별</td>
          <td>
            <input type="radio" id="male" name="gender" value="남자">
            <label for="male">남자</label>
            &nbsp;&nbsp;
            <input type="radio" id="female" name="gender" value="여자">
            <label for="female">여자</label>
          </td>
        </tr>

        <tr>
          <td class="label"><label for="email">이메일</label></td>
          <td><input type="email" id="email" name="email"></td>
        </tr>

        <tr>
          <td class="label"><label for="birth">생년월일</label></td>
          <td><input type="date" id="birth" name="birth"></td>
        </tr>

        <tr>
          <td class="label">관심 분야</td>
          <td>
            <input type="checkbox" id="html" name="interest" value="HTML">
            <label for="html">HTML</label>
            &nbsp;
            <input type="checkbox" id="css" name="interest" value="CSS">
            <label for="css">CSS</label>
            &nbsp;
            <input type="checkbox" id="js" name="interest" value="JavaScript">
            <label for="js">JavaScript</label>
          </td>
        </tr>

        <tr>
          <td class="label"><label for="major">전공</label></td>
          <td>
            <select id="major" name="major">
              <option value="">선택하세요</option>
              <option value="정보보호학전공">정보보호학전공</option>
              <option value="컴퓨터공학과">컴퓨터공학과</option>
              <option value="ai설계">AI설계</option>
            </select>
          </td>
        </tr>

        <tr>
          <td class="label"><label for="intro">자기소개</label></td>
          <td><textarea id="intro" name="intro" rows="5"></textarea></td>
        </tr>
      </table>

      <div class="btn-area">
        <input type="submit" value="회원가입">
        <input type="reset" value="다시작성">
      </div>
    </form>

    <div class="home-link">
      <a href="index.html">홈으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
